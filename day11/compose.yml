services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports: 
    - "5000:5000"
    environment:
    - DB_HOST=db
    - DB_NAME=mydb
    - DB_USER=myuser
    - DB_PASSWORD=pass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s     
      timeout: 10s      
      retries: 3         
      start_period: 10s  
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17.9  
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
