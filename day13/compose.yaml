services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - my-network
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - my-network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web


networks:
  my-network:

 

