services:
  web:
    build:
      context: .
      dockerfile: Dockerfile 
    
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - day
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s     
      timeout: 10s      
      retries: 3         
      start_period: 10s  
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  day: 
