apiVersion: v1
kind: Pod 
metadata:
  name: memory-test
  namespace: day

spec:
  containers:
  - name: nginx
    image: nginx:1.25
    resources: 
      requests:
        memory: "128Mi"
        cpu: "100m"
    
      limits:
        memory: "256Mi"
        cpu: "500m"
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5


  
