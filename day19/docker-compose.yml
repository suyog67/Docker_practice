services:
  web:
    build:
      context: .
      dockerfile: Dockerfile 
    ports:
      - "8080:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - day
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:  
     resources:
       limits:
         cpus: "0.5"
         memory: 256M
networks:
  day:
      
